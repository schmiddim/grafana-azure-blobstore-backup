# Auto-merge Dependabot PRs and push Docker image on dependency updates
#
# This workflow:
# 1. Auto-approves and merges Dependabot PRs
# 2. Builds and pushes Docker image after merge
#
# Required secrets:
#   - DOCKERHUB_USERNAME: Docker Hub username
#   - DOCKERHUB_TOKEN: Docker Hub access token

name: Dependabot Auto-Merge & Docker Push

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pull-requests: write
#  workflows: write

jobs:
  # ==========================================================================
  # Job 1: Auto-merge Dependabot PRs (skip workflow file changes)
  # ==========================================================================
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if PR contains workflow changes
        id: check-workflows
        run: |
          FILES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files -q '.files[].path')
          if echo "$FILES" | grep -q "^\.github/workflows/"; then
            echo "has_workflow_changes=true" >> $GITHUB_OUTPUT
            echo "PR contains workflow changes - skipping auto-merge"
          else
            echo "has_workflow_changes=false" >> $GITHUB_OUTPUT
            echo "No workflow changes - proceeding with auto-merge"
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependabot metadata
        if: steps.check-workflows.outputs.has_workflow_changes == 'false'
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve Dependabot PR
        if: steps.check-workflows.outputs.has_workflow_changes == 'false'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for Dependabot PR
        if: steps.check-workflows.outputs.has_workflow_changes == 'false'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip notice for workflow PRs
        if: steps.check-workflows.outputs.has_workflow_changes == 'true'
        run: |
          echo "## Skipped Auto-Merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR contains workflow file changes and requires manual review." >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 2: Build and push Docker image after merge
  # ==========================================================================
  docker-build-push:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        id: date
        run: echo "tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            schmiddim/grafana-azure-blobstore-backup:${{ steps.date.outputs.tag }}
            schmiddim/grafana-azure-blobstore-backup:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`schmiddim/grafana-azure-blobstore-backup\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.date.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
